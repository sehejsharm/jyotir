name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests (SM-2, scheduler, drill store, sync)
        run: pnpm test

      - name: Typecheck (core, content, web, mobile)
        run: pnpm typecheck

      - name: Build web (static export of all exam/topic/review routes)
        run: pnpm --filter @jyotir/web build

      - name: Export mobile bundles (iOS + Android, Hermes)
        run: pnpm --filter @jyotir/mobile exec expo export --platform ios --platform android --output-dir /tmp/expo-export
        env:
          CI: "1"
